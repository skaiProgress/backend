services:
  postgres:
    image: postgres:16-alpine
    container_name: aiqadam-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: aiqadam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - aiqadam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiqadam"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiqadam-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Хост-порт снаружи контейнера (внутри API всегда 8080). Если 8080 занят — задайте BACKEND_HOST_PORT=8081 в .env
      - "${BACKEND_HOST_PORT:-8080}:8080"
    # Пробрасываем весь .env (рядом с этим файлом) внутрь контейнера.
    # Так OpenAI-ключ попадает в контейнер независимо от регистра имени
    # (OPENAI_API_KEY или OpenAI_API_KEY — Go-код читает оба, см. internal/ai/openai.go).
    env_file:
      - .env
    environment:
      # Значения ниже имеют приоритет над env_file и фиксируют параметры для запуска в Docker Compose.
      PORT: "8080"
      APP_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aiqadam?sslmode=disable
      AUTH_JWT_SECRET: change-me
      AUTH_JWT_ISSUER: aiqadam-backend
      # В APP_ENV=development CORS разрешает любой http://localhost:* (см. server.go)
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:3001
      MIGRATIONS_PATH: /app/migrations
      STORAGE_PATH: /app/storage
      PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-8080}
      # OpenAI-ключ берётся из env_file (.env). Модель можно переопределить переменной OPENAI_MODEL.
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - aiqadam_backend_storage:/app/storage

volumes:
  aiqadam_postgres_data:
  aiqadam_backend_storage:
